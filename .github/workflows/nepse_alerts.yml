name: NEPSE Alert Bot

on:
  schedule:
    # Run every 30 min during NEPSE market hours (Nepal time = UTC+5:45)
    # 10:55 Nepal = 05:10 UTC, 15:05 Nepal = 09:20 UTC
    # Run at 05:10, 05:40, 06:10, 06:40, 07:10, 07:40, 08:10, 08:40, 09:10 UTC
    # Sunday-Thursday (Nepal) = Saturday-Wednesday (UTC)
    - cron: "10 5 * * 0-4"
    - cron: "40 5 * * 0-4"
    - cron: "10 6 * * 0-4"
    - cron: "40 6 * * 0-4"
    - cron: "10 7 * * 0-4"
    - cron: "40 7 * * 0-4"
    - cron: "10 8 * * 0-4"
    - cron: "40 8 * * 0-4"
    - cron: "10 9 * * 0-4"
  workflow_dispatch:  # allow manual trigger

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install nepse requests

      - name: Run alert check (single pass)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python nepse_alerts_ci.py
